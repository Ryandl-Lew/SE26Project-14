<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生物实验助手 - 界面原型</title>
  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1677ff;
      --primary-hover: #4096ff;
      --success: #52c41a;
      --warning: #faad14;
      --error: #ff4d4f;
      --bg: #f5f5f5;
      --bg-card: #fff;
      --text: #222;
      --text-secondary: #666;
      --border: #e8e8e8;
      --sidebar-w: 220px;
      --header-h: 56px;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== Layout ===== */
    .app { display: flex; min-height: 100vh; }

    /* ===== Header ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: #001529;
      color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .header-logo {
      font-size: 18px; font-weight: 700; letter-spacing: 1px;
      display: flex; align-items: center; gap: 8px;
    }
    .header-logo .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .header-btn {
      background: rgba(255,255,255,0.15);
      color: #fff; border: none; padding: 6px 14px; border-radius: var(--radius);
      cursor: pointer; font-size: 14px; transition: background .2s;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }
    .header-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .notification-badge {
      position: relative; cursor: pointer;
    }
    .notification-badge::after {
      content: ''; position: absolute; top: -2px; right: -2px;
      width: 8px; height: 8px; background: var(--error); border-radius: 50%;
      border: 2px solid #001529;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      position: fixed; top: var(--header-h); left: 0; bottom: 0;
      width: var(--sidebar-w); background: #fff;
      border-right: 1px solid var(--border);
      padding: 16px 0; overflow-y: auto; z-index: 50;
    }
    .sidebar-title { padding: 0 20px 16px; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-nav { list-style: none; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; color: var(--text); text-decoration: none;
      font-size: 14px; transition: all .2s; border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: #e6f4ff; color: var(--primary); border-left-color: var(--primary);
    }
    .sidebar-nav a .nav-icon { font-size: 18px; width: 22px; text-align: center; }

    /* ===== Main Content ===== */
    .main {
      flex: 1; margin-left: var(--sidebar-w); margin-top: var(--header-h);
      padding: 24px; min-height: calc(100vh - var(--header-h));
    }

    /* ===== Page Header ===== */
    .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 22px; font-weight: 600; }
    /* ===== Cards Grid ===== */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card {
      background: var(--bg-card); border-radius: var(--radius);
      padding: 20px; border: 1px solid var(--border);
      transition: box-shadow .2s; cursor: pointer;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
    .card-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: var(--radius); font-size: 14px;
      cursor: pointer; border: 1px solid transparent; transition: all .2s;
      font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-default { background: #fff; color: var(--text); border-color: var(--border); }
    .btn-default:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: #fff; color: var(--error); border-color: var(--error); }
    .btn-danger:hover { background: #fff2f0; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }

    /* ===== Search ===== */
    .search-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px; padding: 8px 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1); }

    /* ===== Data Record Form ===== */
    .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .record-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .record-item label {
      display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .record-item .required::after { content: ' *'; color: var(--error); }
    .record-item input, .record-item textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; font-family: inherit; outline: none;
    }
    .record-item input:focus, .record-item textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1);
    }
    .record-item textarea { resize: vertical; min-height: 60px; }
    .image-upload-area {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 24px; text-align: center; color: var(--text-secondary);
      cursor: pointer; transition: all .2s; background: #fafafa;
    }
    .image-upload-area:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== Timeline ===== */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before {
      content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px;
      width: 2px; background: var(--border);
    }
    .timeline-item { position: relative; margin-bottom: 20px; }
    .timeline-item::before {
      content: ''; position: absolute; left: -19px; top: 6px;
      width: 10px; height: 10px; border-radius: 50%; background: var(--primary);
      border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary);
    }
    .timeline-content {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; font-size: 14px;
    }
    .timeline-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }

    /* ===== Chart Area ===== */
    .chart-placeholder {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px; text-align: center;
      min-height: 300px; display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 15px;
    }
    .analysis-controls {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
      align-items: flex-end;
    }
    .analysis-controls .control-group { display: flex; flex-direction: column; gap: 4px; }
    .analysis-controls label { font-size: 12px; color: var(--text-secondary); }
    .analysis-controls select, .analysis-controls input {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 14px; font-family: inherit; outline: none; min-width: 160px;
    }
    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
    .result-table th, .result-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; }
    .result-table th { background: #fafafa; font-weight: 600; }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-secondary);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { margin-bottom: 16px; font-size: 15px; }

    /* ===== Tag / Badge ===== */
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 12px; margin-right: 4px;
    }
    .tag-success { background: #f6ffed; color: var(--success); border: 1px solid #b7eb8f; }
    .tag-warning { background: #fffbe6; color: #d48806; border: 1px solid #ffe58f; }
    .tag-default { background: #f5f5f5; color: #666; border: 1px solid #d9d9d9; }

    /* ===== Tabs ===== */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab {
      padding: 10px 20px; cursor: pointer; font-size: 14px;
      color: var(--text-secondary); border-bottom: 2px solid transparent;
      transition: all .2s;
    }
    .tab:hover { color: var(--primary); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }

    .detail-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric-card {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .metric-card .metric-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .metric-card .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .metric-card .metric-note {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .info-list {
      display: grid;
      gap: 10px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--text-secondary); }
    .info-row .value { color: var(--text); font-weight: 500; text-align: right; }
    .flow-list { display: grid; gap: 12px; }
    .flow-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 12px;
      align-items: start;
    }
    .flow-dot {
      width: 12px;
      height: 12px;
      margin-top: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
    }
    .flow-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
    }
    .flow-card .flow-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .flow-card .flow-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .progress-list { display: grid; gap: 14px; }
    .progress-item { display: grid; gap: 6px; }
    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      background: #edf0f5;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), #69a7ff);
    }
    .subpage-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .subpage-toolbar .hint {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== Todo List ===== */
    .todo-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .todo-summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .todo-summary-card .summary-icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .todo-summary-card .summary-info .summary-num {
      font-size: 26px; font-weight: 700; color: var(--text);
    }
    .todo-summary-card .summary-info .summary-label {
      font-size: 13px; color: var(--text-secondary);
    }
    .todo-list { display: grid; gap: 12px; }
    .todo-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      transition: box-shadow .2s;
    }
    .todo-item:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); }
    .todo-item-left { flex: 1; min-width: 200px; }
    .todo-item-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .todo-item-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
    .todo-item-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
    .todo-item-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .todo-priority-high { background: #fff2f0; color: var(--error); border: 1px solid #ffccc7; }
    .todo-priority-medium { background: #fffbe6; color: #d48806; border: 1px solid #ffe58f; }
    .todo-priority-low { background: #f6ffed; color: var(--success); border: 1px solid #b7eb8f; }

    /* ===== Messages / Chat ===== */
    .chat-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: calc(100vh - var(--header-h) - 140px);
      min-height: 480px;
      background: var(--bg-card);
    }
    .chat-sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: #fafafa;
    }
    .chat-sidebar-title {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .chat-contact {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .2s;
      border-left: 3px solid transparent;
    }
    .chat-contact:hover { background: #f0f0f0; }
    .chat-contact.active { background: #e6f4ff; border-left-color: var(--primary); }
    .chat-contact .contact-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .chat-contact .contact-info { flex: 1; min-width: 0; }
    .chat-contact .contact-name { font-size: 14px; font-weight: 500; }
    .chat-contact .contact-preview {
      font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-contact .contact-badge {
      background: var(--error); color: #fff; font-size: 11px;
      border-radius: 10px; padding: 0 6px; line-height: 18px; min-width: 18px; text-align: center;
    }
    .chat-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .chat-header .chat-header-name { font-size: 15px; font-weight: 600; }
    .chat-header .chat-header-status { font-size: 12px; color: var(--success); }
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
    }
    .chat-msg {
      display: flex;
      gap: 8px;
      max-width: 75%;
    }
    .chat-msg.self { align-self: flex-end; flex-direction: row-reverse; }
    .chat-msg .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .chat-msg .msg-bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-msg.self .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .chat-msg .msg-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .chat-input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1); }

    /* ===== Action Bar ===== */
    .action-bar {
      display: flex; gap: 10px; padding: 16px 0;
      border-top: 1px solid var(--border); margin-top: 20px;
      flex-wrap: wrap;
    }

    /* ===== Toggle Switch ===== */
    .toggle {
      position: relative; display: inline-block; width: 44px; height: 22px;
    }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 22px;
      cursor: pointer; transition: .3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; left: 2px; bottom: 2px;
      width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: .3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

    /* ===== Responsive ===== */
    @media (max-width: 991px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .card-grid { grid-template-columns: 1fr; }
      .record-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 767px) {
      .header { padding: 0 12px; }
      .main { padding: 12px; }
      .page-header h1 { font-size: 18px; }
      .analysis-controls { flex-direction: column; }
      .analysis-controls select, .analysis-controls input { width: 100%; }
      .detail-grid, .metric-grid { grid-template-columns: 1fr; }
    }

    /* ===== Modal Overlay ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: var(--radius); width: 90%; max-width: 520px;
      padding: 24px; box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .modal h3 { margin-bottom: 16px; font-size: 17px; }
    .modal .form-group { margin-bottom: 14px; }
    .modal .form-group label { display: block; font-size: 13px; margin-bottom: 4px; color: var(--text-secondary); }
    .modal .form-group input, .modal .form-group textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; font-family: inherit; outline: none;
    }
    .modal .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- ==================== HEADER ==================== -->
    <header class="header">
      <div class="header-logo">
        <div class="logo-icon">🧬</div>
        生物实验助手
      </div>
      <div class="header-actions">
        <span class="notification-badge" title="新提醒">🔔</span>
        <div class="header-avatar" title="用户">张</div>
      </div>
    </header>

    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
      <div class="sidebar-title">导航菜单</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="active" onclick="showPage('projects')"><span class="nav-icon">📋</span> 我的项目</a></li>
        <li><a href="#" onclick="showPage('todo')"><span class="nav-icon">✅</span> 我的待办</a></li>
        <li><a href="#" onclick="showPage('analysis')"><span class="nav-icon">🔬</span> 数据分析</a></li>

    function renderMessagesPage() {
      const contact = chatContacts[currentContactId];

      function renderContactList() {
        return Object.keys(chatContacts).map(id => {

            </div>
          `;
        }).join('');
      }

      function renderMessages() {
        return history.map(msg => {

          const avatarColor = isMe ? '#001529' : contact.color;
          const initial = isMe ? '我' : contact.name.charAt(0);
          return `
            <div class="chat-msg ${isMe ? 'self' : ''}">

                <div class="msg-bubble">${msg.text}</div>

            </div>
          `;
        }).join('');
      }

      return `

          <div>
            <h1>消息</h1>
          </div>
        </div>

        <div class="chat-wrap">
          <div class="chat-sidebar">

          </div>
        </div>
      `;
    }

    function switchContact(id) {
      currentContactId = id;
      if (chatContacts[id]) chatContacts[id].unread = 0;
      showPage('messages');
    }

    function sendChatMessage() {
      const input = document.getElementById('chat-input-box');
      const text = (input.value || '').trim();
      if (!text) return;
      if (!chatHistory[currentContactId]) chatHistory[currentContactId] = [];
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      chatHistory[currentContactId].push({ from: 'me', text: text, time: timeStr });
      input.value = '';
      showPage('messages');
      setTimeout(() => {
        const body = document.getElementById('chat-body');
        if (body) body.scrollTop = body.scrollHeight;
      }, 50);
    }
