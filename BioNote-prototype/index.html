<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioNote - 生物实验记录助手</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">🧬</span>
        <span class="brand-name">BioNote</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-search">
          <input type="search" id="global-search" placeholder="搜索项目、实验记录、模板、成员、附件" />
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" id="btn-project-switch">
            当前项目：<strong id="current-project-label">GFP 融合蛋白表达</strong> ▾
          </button>
          <div class="dropdown" id="new-dropdown">
            <button class="btn btn-primary" id="btn-new">+ 新建</button>
            <div class="dropdown-menu hidden" id="new-menu">
              <button data-action="new-project">新建项目</button>
              <button data-action="new-experiment">新建实验记录</button>
              <button data-action="new-template">新建模板</button>
            </div>
          </div>
          <button class="btn btn-icon" title="通知">🔔</button>
          <div class="avatar" title="李同学">李</div>
        </div>
      </header>

      <main class="content" id="main-content"></main>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-container"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
