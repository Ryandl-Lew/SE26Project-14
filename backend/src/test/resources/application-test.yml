spring:
  datasource:
    url: jdbc:h2:mem:bionote;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate

bionote:
  jwt:
    secret: test-secret-must-be-at-least-thirty-two-characters-long
    expiration-seconds: 3600
  seed:
    enabled: true

debug: false

logging:
  level:
    root: WARN
    com.bionote: INFO
