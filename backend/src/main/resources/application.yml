spring:
  application:
    name: bionote-backend
  profiles:
    default: dev
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

bionote:
  jwt:
    secret: ${JWT_SECRET:development-only-secret-change-before-deploy-123456789}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    root: ${FILE_STORAGE_ROOT:./storage}
  seed:
    enabled: ${SEED_ENABLED:true}

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
