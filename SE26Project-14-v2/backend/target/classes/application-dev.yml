spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bionote?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:bionote}
    password: ${DB_PASSWORD:bionote-dev}
  jpa:
    show-sql: false
bionote:
  dev-seed-enabled: ${DEV_SEED_ENABLED:true}
  dev-seed-password: ${DEV_SEED_PASSWORD:Demo123!}
