spring:
  datasource:
    url: jdbc:h2:mem:bionote;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
bionote:
  jwt:
    secret: test-secret-with-at-least-thirty-two-characters-123456
    ttl-minutes: 5
  upload-root: ${java.io.tmpdir}/bionote-test-uploads

